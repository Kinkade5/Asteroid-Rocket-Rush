  function spawnAsteroidPair(x) {
    // Difficulty scales on pairsPassed, not `score` — since coin points can
    // make `score` jump big, it would warp the gap-tightening curve.
    // Gap formula and floor come from the active difficulty tier.
    const diff = getDifficulty();
    const gapSize = Math.max(diff.gapMin, diff.gapSize - pairsPassed * diff.gapRamp);
    const minY = 80;
    const maxY = BASE_H - 80 - gapSize;
    const gapY = minY + Math.random() * (maxY - minY);
    const width = 58;
    asteroids.push({
      x, y: 0, w: width, h: gapY,
      passed: false,
      seed: Math.random() * 1000,
      top: true,
    });
    asteroids.push({
      x, y: gapY + gapSize, w: width, h: BASE_H - (gapY + gapSize),
      passed: false,
      seed: Math.random() * 1000,
      top: false,
    });

    // === Spawn coin(s) in the gap ===
    // Three placement strategies, weighted by rarity:
    //   1. Single bronze in center of gap (safe, common — 55%)
    //   2. Single gold near edge (risky, medium — 30%)
    //   3. Cluster of 3 bronze in an arc (slight risk from motion — 15%)
    // These numbers are tunable if the balance feels off.
    const roll = Math.random();
    const coinX = x + width / 2;
    const gapTop = gapY;
    const gapBottom = gapY + gapSize;
    const gapMid = (gapTop + gapBottom) / 2;

    if (roll < 0.55) {
      // Safe bronze in center
      coins.push(makeCoin(coinX, gapMid, 'bronze'));
    } else if (roll < 0.85) {
      // Risky gold — tucked within ~22px of a random asteroid edge
      const nearTop = Math.random() < 0.5;
      const risky_y = nearTop
        ? gapTop + 22 + Math.random() * 6
        : gapBottom - 22 - Math.random() * 6;
      coins.push(makeCoin(coinX, risky_y, 'gold'));
    } else {
      // Cluster: 3 bronze coins in a gentle arc across the gap
      const span = Math.min(56, gapSize - 40);
      for (let i = -1; i <= 1; i++) {
        coins.push(makeCoin(
          coinX + i * 18,
          gapMid + i * (span / 3) * (Math.random() < 0.5 ? 1 : -1),
          'bronze'
        ));
      }
    }
  }

  function makeCoin(x, y, kind) {
    const diff = getDifficulty();
    return {
      x, y,
      kind,                       // 'bronze' or 'gold'
      r: kind === 'gold' ? 11 : 9,
      value: kind === 'gold' ? diff.coinGoldValue : diff.coinBronzeValue,
      phase: Math.random() * Math.PI * 2,
      collected: false,
      collectAnim: 0,             // 0-1 animates coin vanishing
    };
  }

  function spawnPowerup(x, y) {
    // Weighted selection:
    //   - Shield is prioritized when player is low (survival > utility)
    //   - Otherwise, weighted mix across all 4 types
    //   - 2x is slightly rarer (most impactful = shouldn't flood the game)
    // We look up the current effective maxShields (tier + Reinforced Hull
    // upgrade) here — on Master without upgrades it's 2, so a player at 2
    // shields is already "at max" and shouldn't see shields. With Hull T3
    // on Master it climbs to 5, so shields keep being useful.
    const maxShields = getMaxShields();
    let type;
    if (shieldCharges === 0) {
      // Low on defenses — push shield hard, but still allow variety
      const r = Math.random();
      if (r < 0.65) type = 'shield';
      else if (r < 0.8) type = 'slowmo';
      else if (r < 0.92) type = 'magnet';
      else type = 'double';
    } else if (shieldCharges >= maxShields) {
      // Can't hold more shields — pick from the other three
      const r = Math.random();
      if (r < 0.45) type = 'slowmo';
      else if (r < 0.8) type = 'magnet';
      else type = 'double';
    } else {
      // Normal distribution
      const r = Math.random();
      if (r < 0.35) type = 'shield';
      else if (r < 0.6) type = 'slowmo';
      else if (r < 0.85) type = 'magnet';
      else type = 'double';
    }
    powerups.push({ x, y, type, r: 14, phase: Math.random() * Math.PI * 2 });
  }

  function addParticles(x, y, opts = {}) {
    const n = opts.n ?? 6;
    const color = opts.color ?? '#ff9a3c';
    const speed = opts.speed ?? 2;
    const life = opts.life ?? 30;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = Math.random() * speed + 0.4;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp + (opts.vx ?? 0),
        vy: Math.sin(a) * sp + (opts.vy ?? 0),
        life, maxLife: life,
        color,
        size: (opts.size ?? 2) + Math.random() * 1.5,
      });
    }
  }

  function flap() {
    if (state !== STATE.PLAY) return;
    rocket.vy = FLAP;
    addParticles(rocket.x - 10, rocket.y + 4, {
      n: 5, color: '#ffb84d', speed: 1.8, life: 20, vx: -2,
    });
  }

  // --- Input ---
  // A short lock after game-over prevents end-of-life input leaking into the
  // next frame and causing weird ghost-thrust or accidental restarts.
  let inputLockUntil = 0;

  // Ensures audio is initialized and resumed. Safe to call from any user
  // interaction — no-op if already set up. Call this from every input entry
  // point so mobile browsers unlock audio on the first gesture, whatever it is.
  function ensureAudio() {
    if (!Audio.ready()) {
      const ok = Audio.init();
      if (ok && Audio.getSettings().musicOn) Audio.startMusic();
    } else {
      Audio.resume();
    }
  }

  // Thrust sound bookkeeping — mirror of the `thrusting` flag, so we only
  // call start/stop when the boolean actually flips. Setting `thrusting`
  // directly from many call sites is simpler than routing everything through
  // a setter; we sync the sound in the update loop instead.
  let thrustSoundOn = false;
  function syncThrustSound() {
    const shouldPlay = thrusting && state === STATE.PLAY;
    if (shouldPlay && !thrustSoundOn) {
      Audio.startThrust();
      thrustSoundOn = true;
    } else if (!shouldPlay && thrustSoundOn) {
      Audio.stopThrust();
      thrustSoundOn = false;
    }
  }

  function handlePointerDown(e) {
    if (e) e.preventDefault();
    if (performance.now() < inputLockUntil) return;
    // If touchstart already handled this, skip the synthetic pointer event
    // the browser generates. Prevents double-counting on touch devices.
    if (touchHandled) return;

    ensureAudio();

    // Capture the pointer so subsequent events keep flowing to us even if
    // the finger drifts outside the canvas bounds — critical for touch.
    if (e && e.pointerId !== undefined && canvas.setPointerCapture) {
      try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
    }

    // Always flip thrusting on. It's safe in any state — the update loop only
    // applies thrust force when state === PLAY, so this is a no-op in menu/dead.
    // The important thing is that if the user is HOLDING through a state change
    // (e.g. clicks LAUNCH and keeps holding), the thrust is already live when
    // PLAY begins.
    thrusting = true;
  }

  function handlePointerUp(e) {
    if (e && e.pointerId !== undefined && canvas.releasePointerCapture) {
      try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
    }
    thrusting = false;
  }

  canvas.addEventListener('pointerdown', handlePointerDown);
  canvas.addEventListener('pointerup', handlePointerUp);
  canvas.addEventListener('pointercancel', handlePointerUp);
  // NOTE: intentionally NOT listening to 'pointerleave' — on touch it fires
  // on the tiniest finger drift and kills the thrust mid-flight. Pointer
  // capture (above) keeps the events flowing even if the finger wanders.

  // Touch-specific handlers. Pointer Events are the "modern unified" API, but
  // on mobile Safari/Chrome `touchstart` fires ~50-100ms earlier than
  // `pointerdown` because the browser doesn't need to wait to classify the
  // gesture. We wire both and use a "just handled touch" flag to prevent
  // double-firing when the browser generates synthetic pointer events from
  // a touch.
  let touchHandled = false;
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (performance.now() < inputLockUntil) return;
    ensureAudio();
    touchHandled = true;
    thrusting = true;
    // Clear the flag after a bit so a later pointerdown (e.g. from a mouse
    // plugged in) isn't permanently ignored.
    setTimeout(() => { touchHandled = false; }, 500);
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    thrusting = false;
  }, { passive: false });

  canvas.addEventListener('touchcancel', (e) => {
    e.preventDefault();
    thrusting = false;
  }, { passive: false });

  // Release thrust if the window loses focus or is hidden (notifications, tab switch)
  window.addEventListener('blur', () => { thrusting = false; });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) thrusting = false;
  });

  // Keyboard: hold Space/Up to thrust (parity with touch/mouse hold behavior).
  // Track the "held" state and drive `thrusting` from it so keyboard and
  // pointer inputs can't fight each other.
  let keyHeld = false;
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      if (e.repeat) return; // ignore OS key-repeat
      if (performance.now() < inputLockUntil) return;
      ensureAudio();
      if (state === STATE.MENU || state === STATE.DEAD) {
        startGame();
        // If the user is still holding the key when PLAY begins, thrust is live.
        keyHeld = true;
        thrusting = true;
        return;
      }
      keyHeld = true;
      thrusting = true;
    }
  });
  document.addEventListener('keyup', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      keyHeld = false;
      thrusting = false;
    }
  });

  // --- Overlay visibility helpers ---
  // `display: none` after the fade completes is the key to preventing ghost-
  // touches — an opacity:0 element is still in the hit-test tree and can
  // receive events on some mobile browsers, even with pointer-events:none.
  // We also toggle the `disabled` attribute on every button so the browser
  // (not just CSS) knows it can't be activated.
  const OVERLAY_FADE_MS = 250;
  let pendingHideTimers = new WeakMap();

  function setButtonsEnabled(overlayEl, enabled) {
    const buttons = overlayEl.querySelectorAll('button');
    buttons.forEach(b => { b.disabled = !enabled; });
  }

  function showOverlay(overlayEl) {
    // Cancel any pending "display:none" timer from a previous hide
    if (pendingHideTimers.has(overlayEl)) {
      clearTimeout(pendingHideTimers.get(overlayEl));
      pendingHideTimers.delete(overlayEl);
    }
    overlayEl.classList.remove('gone');
    // Force a reflow so the transition from `display:none` → `opacity:1`
    // actually animates instead of snapping.
    void overlayEl.offsetWidth;
    overlayEl.classList.remove('hidden');
    overlayEl.classList.add('active');
    setButtonsEnabled(overlayEl, true);
  }

  function hideOverlay(overlayEl) {
    setButtonsEnabled(overlayEl, false); // disable immediately, not after fade
    overlayEl.classList.add('hidden');
    overlayEl.classList.remove('active');
    // After the fade completes, apply display:none to completely remove from
    // hit testing. If we're shown again before that, showOverlay cancels it.
    const t = setTimeout(() => {
      overlayEl.classList.add('gone');
      pendingHideTimers.delete(overlayEl);
    }, OVERLAY_FADE_MS + 20); // small safety margin past the CSS transition
    pendingHideTimers.set(overlayEl, t);
  }

  // Buttons: use pointerdown (snappier than click on mobile, no 300ms wait).
  // stopPropagation so the canvas underneath doesn't also receive this event.
  // `this.disabled` check is a belt-and-suspenders defense: the CSS class
  // `gone` removes the overlay from the DOM entirely, but if a ghost touch
  // somehow lands during the fade window, the disabled check kills it.
  function bindStart(el) {
    el.addEventListener('pointerdown', (e) => {
      if (el.disabled) return;
      if (performance.now() < inputLockUntil) return;
      e.stopPropagation();
      e.preventDefault();
      ensureAudio();
      Audio.play.uiClick();
      startGame();
    });
  }
  bindStart(startBtn);
  bindStart(restartBtn);

  // QUIT button — back to main menu from game over
  quitBtn.addEventListener('pointerdown', (e) => {
    if (quitBtn.disabled) return;
    if (performance.now() < inputLockUntil) return;
    e.stopPropagation();
    e.preventDefault();
    ensureAudio();
    Audio.play.uiBack();
    goToMenu();
  });

  // ===== Settings UI =====
  // Reflects the saved audio settings into the toggle UI, then wires
  // click handlers that update both the visual state and the Audio engine.
  function refreshSettingsUI() {
    const s = Audio.getSettings();
    musicToggle.classList.toggle('on', s.musicOn);
    musicToggle.setAttribute('aria-checked', String(s.musicOn));
    sfxToggle.classList.toggle('on', s.sfxOn);
    sfxToggle.setAttribute('aria-checked', String(s.sfxOn));
    refreshMuteIcon();
  }

  function refreshMuteIcon() {
    muteToggle.textContent = Audio.isMuted() ? '🔇' : '🔊';
  }

  settingsBtn.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    e.preventDefault();
    ensureAudio();
    Audio.play.uiClick();
    refreshSettingsUI();
    hideOverlay(startScreen);
    showOverlay(settingsScreen);
  });

  settingsCloseBtn.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    e.preventDefault();
    Audio.play.uiBack();
    hideOverlay(settingsScreen);
    showOverlay(startScreen);
  });

  musicToggle.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    e.preventDefault();
    ensureAudio();
    const newVal = !Audio.getSettings().musicOn;
    Audio.setMusicOn(newVal);
    Audio.play.uiClick();
    refreshSettingsUI();
  });

  sfxToggle.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    e.preventDefault();
    ensureAudio();
    const newVal = !Audio.getSettings().sfxOn;
    Audio.setSfxOn(newVal);
    // Play the click AFTER toggling so the user hears it when enabling,
    // and doesn't hear it (correctly) when disabling
    if (newVal) Audio.play.uiClick();
    refreshSettingsUI();
  });

  // In-game mute button toggles both channels together as a quick shortcut
  muteToggle.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    e.preventDefault();
    ensureAudio();
    Audio.toggleMuteAll();
    refreshMuteIcon();
  });

  // ===== Wallet UI =====
  // Called on page load, after every run (to show new banked coins), and
  // after every purchase (to show decremented balance).
  function refreshWalletUI() {
    const formatted = bankedCoins.toLocaleString();
    walletAmount.textContent = formatted;
    shopWallet.textContent = formatted;
  }

  // ===== Difficulty selector =====
  // Builds the 4-tile selector on the start menu. Rebuilt whenever unlock
  // state changes (so Master transitions from locked → selectable without
  // a reload) or when the player picks a different tier. Tiles show:
  //   - Icon + short name (always)
  //   - Tagline below when selected
  //   - 🔒 overlay when locked + the unlockHint
  function renderDifficultySelector() {
    let html = '';
    for (const id of DIFFICULTY_ORDER) {
      const d = DIFFICULTIES[id];
      const locked = d.locked && !isMasterUnlocked();
      const selected = id === currentDifficultyId && !locked;
      const classes = [
        'diff-tile',
        selected ? 'selected' : '',
        locked ? 'locked' : '',
      ].filter(Boolean).join(' ');
      // Locked tiles show the tagline as the unlock hint (replacing the ??? teaser)
      const tagline = locked ? (d.unlockHint || 'Locked') : d.tagline;
      html += `
        <div class="${classes}" data-diff="${id}" style="--tier-color:${d.color}">
          <div class="diff-tile-icon">${d.icon}</div>
          <div class="diff-tile-name">${d.name.toUpperCase()}</div>
          ${locked ? '<div class="diff-tile-lock">🔒</div>' : ''}
          <div class="diff-tile-tagline">${tagline}</div>
        </div>`;
    }
    difficultyRow.innerHTML = html;
    // Wire tile clicks
    difficultyRow.querySelectorAll('.diff-tile').forEach(tile => {
      tile.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
        e.preventDefault();
        const id = tile.getAttribute('data-diff');
        const d = DIFFICULTIES[id];
        if (d.locked && !isMasterUnlocked()) {
          // Tapping a locked tile plays a soft "no" sound, doesn't change state
          Audio.play.uiBack();
          return;
        }
        if (id === currentDifficultyId) {
          Audio.play.uiClick();
          return; // already selected
        }
        ensureAudio();
        setDifficulty(id);
        Audio.play.uiClick();
        renderDifficultySelector();
      });
    });
  }

  // Update the small tier badge shown during play (top-left under mute btn).
  // Colored in the active tier's color so at a glance you know which mode
  // you're in. Hidden on menu / game-over (tier appears on the game-over
  // overlay separately).
  function refreshTierBadge() {
    const d = getDifficulty();
    tierBadge.textContent = d.name.toUpperCase();
    tierBadge.style.color = d.color;
  }

  // Update the tier pill shown above "GAME OVER" — same colors as the badge
  // during play, reinforces which difficulty the stats below belong to.
  function refreshGameoverTier() {
    const d = getDifficulty();
    gameoverTier.textContent = d.name.toUpperCase() + ' TIER';
    gameoverTier.style.color = d.color;
  }

  // ===== Shop state =====
  // Tracks which view is showing. When null, we're on the category grid.
  // When set to a category id, we're viewing that category's upgrades.
  // Used by back/close buttons to know what to do.
  let currentShopCategory = null;

  // Count "tiers purchased" across a category — used for the progress badge
  // on category tiles ("2/9 upgraded" etc.) so the player sees at a glance
  // which category they've invested in most.
  function getCategoryProgress(catId) {
    let owned = 0, max = 0;
    for (const def of UPGRADE_DEFS) {
      if (def.category !== catId) continue;
      owned += upgrades[def.line][def.stat];
      max += MAX_UPGRADE_TIER;
    }
    return { owned, max };
  }

  // ===== Shop rendering — category grid =====
  function renderShopCategories() {
    refreshWalletUI();
    shopTitle.textContent = 'UPGRADES';
    shopBackBtn.classList.remove('visible');
    shopCategoriesEl.classList.remove('hidden-view');
    shopList.classList.add('hidden-view');

    let html = '';
    for (const cat of CATEGORIES) {
      const { owned, max } = getCategoryProgress(cat.id);
      const isMaxed = owned === max;
      // Emoji detection: if the icon is a non-ASCII char, treat it as emoji.
      // Otherwise render with a colored text class (e.g. "2✕")
      const isEmoji = /\p{Extended_Pictographic}/u.test(cat.icon);
      const iconStyle = isEmoji ? '' : ` style="color:${cat.color}; font-size:38px"`;
      const iconClass = isEmoji ? 'category-tile-icon' : 'category-tile-icon text-icon';
      html += `
        <div class="category-tile" data-category="${cat.id}">
          <div class="category-tile-progress${isMaxed ? ' maxed' : ''}">${owned}/${max}</div>
          <div class="${iconClass}"${iconStyle}>${cat.icon}</div>
          <div class="category-tile-name">${cat.name.toUpperCase()}</div>
          <div class="category-tile-tagline">${cat.tagline}</div>
        </div>`;
    }
    shopCategoriesEl.innerHTML = html;

    // Wire tile clicks
    shopCategoriesEl.querySelectorAll('.category-tile').forEach(tile => {
      tile.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
        e.preventDefault();
        Audio.play.uiClick();
        const catId = tile.getAttribute('data-category');
        openShopCategory(catId);
      });
    });
  }

  // ===== Shop rendering — individual category =====
  function openShopCategory(catId) {
    currentShopCategory = catId;
    const cat = CATEGORIES.find(c => c.id === catId);
    shopTitle.textContent = cat.name.toUpperCase();
    shopBackBtn.classList.add('visible');
    shopCategoriesEl.classList.add('hidden-view');
    shopList.classList.remove('hidden-view');
    renderCategoryUpgrades(catId);
  }

  function renderCategoryUpgrades(catId) {
    refreshWalletUI();
    const defs = UPGRADE_DEFS.filter(d => d.category === catId);
    let html = '';
    for (const def of defs) {
      const currentTier = upgrades[def.line][def.stat];
      const isMaxed = currentTier >= MAX_UPGRADE_TIER;
      const nextTier = currentTier + 1;
      const cost = isMaxed ? null : UPGRADE_COSTS[nextTier];
      const canAfford = !isMaxed && bankedCoins >= cost;
      const vals = TIER_VALUES[def.valueTable];
      const currentVal = def.format(vals[currentTier]);
      const nextVal = isMaxed ? null : def.format(vals[nextTier]);

      let pips = '';
      for (let t = 1; t <= MAX_UPGRADE_TIER; t++) {
        pips += `<span class="upgrade-tier-pip${t <= currentTier ? ' filled' : ''}"></span>`;
      }

      let btnHtml;
      if (isMaxed) {
        btnHtml = `<button class="upgrade-buy maxed" disabled>MAXED</button>`;
      } else {
        btnHtml = `<button class="upgrade-buy" data-upgrade="${def.id}"${canAfford ? '' : ' disabled'}>${cost.toLocaleString()}</button>`;
      }

      const valuesRow = isMaxed
        ? `<div class="upgrade-values">Max tier reached</div>`
        : `<div class="upgrade-values">${currentVal}<span class="arrow">→</span><span class="next">${nextVal}</span></div>`;

      html += `
        <div class="upgrade-card">
          <div class="upgrade-header">
            <div class="upgrade-label">${def.label}</div>
            <div class="upgrade-tier-pips">${pips}</div>
          </div>
          <div class="upgrade-desc">${def.desc}</div>
          ${valuesRow}
          ${btnHtml}
        </div>`;
    }
    shopList.innerHTML = html;

    shopList.querySelectorAll('.upgrade-buy[data-upgrade]').forEach(btn => {
      btn.addEventListener('pointerdown', (e) => {
        if (btn.disabled) return;
        e.stopPropagation();
        e.preventDefault();
        const id = btn.getAttribute('data-upgrade');
        attemptPurchase(id);
      });
    });
  }

  // Called after any purchase — refreshes whichever view is currently open.
  function refreshShopView() {
    if (currentShopCategory) {
      renderCategoryUpgrades(currentShopCategory);
    } else {
      renderShopCategories();
    }
    refreshWalletUI();
  }

  function attemptPurchase(upgradeId) {
    const def = UPGRADE_DEFS.find(d => d.id === upgradeId);
    if (!def) return;
    const currentTier = upgrades[def.line][def.stat];
    if (currentTier >= MAX_UPGRADE_TIER) return; // already maxed
    const nextTier = currentTier + 1;
    const cost = UPGRADE_COSTS[nextTier];
    if (bankedCoins < cost) return;

    bankedCoins -= cost;
    upgrades[def.line][def.stat] = nextTier;
    saveBankedCoins();
    saveUpgrades();
    Audio.play.coinGold(); // satisfying purchase chime
    if (navigator.vibrate) navigator.vibrate(20);
    refreshShopView();
  }

  shopBtn.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    e.preventDefault();
    ensureAudio();
    Audio.play.uiClick();
    currentShopCategory = null; // always open on the category grid
    renderShopCategories();
    hideOverlay(startScreen);
    showOverlay(shopScreen);
  });

  // Back button: if inside a category, pops to the category grid.
  // (When on the category grid itself, the back button is hidden so there's
  // nothing to handle — CLOSE is the only option.)
  shopBackBtn.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    e.preventDefault();
    Audio.play.uiBack();
    currentShopCategory = null;
    renderShopCategories();
  });

  shopCloseBtn.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    e.preventDefault();
    Audio.play.uiBack();
    currentShopCategory = null;
    hideOverlay(shopScreen);
    showOverlay(startScreen);
    refreshWalletUI();
  });

  function startGame() {
    reset();
    state = STATE.PLAY;
    hideOverlay(startScreen);
    hideOverlay(gameOverScreen);
    // Hide the unlock toast in case it was still showing from the last run
    unlockToast.classList.remove('show');
    // Show the in-game mute icon — always accessible during play
    muteToggle.classList.remove('hidden');
    refreshMuteIcon();
    // Reveal both HUDs (asteroids on top, score on bottom) + tier badge
    hud.classList.remove('hud-hidden');
    roundHud.classList.remove('hud-hidden');
    refreshTierBadge();
    tierBadge.classList.remove('hud-hidden');
    updateHud();

    // === LAUNCH BURST ===
    // No delay before gameplay — the "oomph" runs concurrently with the first
    // moments of play: ignition flash, screen shake, thrust particles, haptic.
    // Feels punchy without making the player wait.
    shake = 8;
    flashEl.style.transition = 'none';
    flashEl.style.opacity = '0.35';
    // Next frame: fade it out smoothly
    requestAnimationFrame(() => {
      flashEl.style.transition = 'opacity 0.25s ease-out';
      flashEl.style.opacity = '0';
    });
    // Big ignition plume behind the rocket
    addParticles(rocket.x - 14, rocket.y, {
      n: 22, color: '#ffd86b', speed: 3.2, life: 28, vx: -3, size: 2,
    });
    addParticles(rocket.x - 14, rocket.y, {
      n: 14, color: '#ff7e3c', speed: 2.5, life: 26, vx: -2.5, size: 2.5,
    });
    // Small upward kick so the launch feels like a LAUNCH (not a sag).
    // Previously tried and reverted because of a separate bug that made thrust
    // feel delayed on touch; with that bug fixed (click-start now engages
    // thrust for held fingers), the initial boost feels right again.
    rocket.vy = -2.5;
    if (navigator.vibrate) navigator.vibrate(25);
    Audio.play.launch();
  }

  // Go back to main menu (from game over via QUIT button)
  function goToMenu() {
    state = STATE.MENU;
    thrusting = false;
    hideOverlay(gameOverScreen);
    showOverlay(startScreen);
    // Hide the unlock toast if it's still visible from a Master unlock
    unlockToast.classList.remove('show');
    // Hide the in-game mute icon — gear button in menu handles audio now
    muteToggle.classList.add('hidden');
    // Hide both HUDs so the menu looks clean
    hud.classList.add('hud-hidden');
    roundHud.classList.add('hud-hidden');
    tierBadge.classList.add('hud-hidden');
    // Also clear lingering play-state objects for a clean menu view
    asteroids = [];
    powerups = [];
    coins = [];
    popups = [];
    particles = [];
    shieldCharges = getStartingShields();
    shieldIFrameUntil = 0;
    shieldPopEffect = 0;
    slowmoTime = 0;
    doubleTime = 0;
    magnetTime = 0;
    shake = 0;
    // Re-center rocket for the menu-float animation
    rocket.x = 90;
    rocket.y = BASE_H / 2;
    rocket.vy = 0;
    rocket.rot = 0;
    // Rebuild the difficulty selector in case Master got unlocked in the
    // run that just ended.
    renderDifficultySelector();
  }

  function gameOver() {
    if (state !== STATE.PLAY) return;
    state = STATE.DEAD;
    thrusting = false;
    keyHeld = false;
    // Ignore input for 500ms after death — prevents accidental restart from
    // the tail end of whatever input was happening when the player crashed.
    // (e.g. mouse still held, key still held, finger still touching.) The
    // game-over overlay appears at 700ms, so by the time RETRY/QUIT are
    // visible, input is flowing normally again.
    inputLockUntil = performance.now() + 500;
    shake = 18;
    flashEl.style.opacity = '0.6';
    setTimeout(() => {
      flashEl.style.opacity = '0';
      flashEl.style.transition = 'opacity 0.4s';
    }, 30);

    addParticles(rocket.x, rocket.y, { n: 40, color: '#ff5a3c', speed: 5, life: 50, size: 3 });
    addParticles(rocket.x, rocket.y, { n: 20, color: '#ffd86b', speed: 3, life: 40, size: 2 });

    // Haptic on death (mobile only — silently ignored on desktop)
    if (navigator.vibrate) navigator.vibrate([30, 40, 80]);
    Audio.stopThrust();
    thrustSoundOn = false;
    Audio.play.death();

    // === Record bests (per-tier, independently) ===
    // Each tier has its own score & asteroids best (stored in
    // bestScoreByTier / bestAsteroidsByTier). Comparing across tiers would
    // be unfair — a 500 on Beginner isn't the same as a 500 on Master — so
    // we keep them separated.
    const tierId = currentDifficultyId;
    const prevBestScore = bestScoreByTier[tierId] || 0;
    const prevBestAsteroids = bestAsteroidsByTier[tierId] || 0;
    const scoreIsNewBest = score > prevBestScore;
    const roundIsNewBest = pairsPassed > prevBestAsteroids;
    if (scoreIsNewBest) {
      bestScoreByTier[tierId] = score;
      saveBestScoreByTier();
    }
    if (roundIsNewBest) {
      bestAsteroidsByTier[tierId] = pairsPassed;
      saveBestAsteroidsByTier();
    }

    // === Master unlock check ===
    // If the player just beat the unlock tier (Expert) with the threshold
    // score, Master becomes selectable. Show a celebration toast on the
    // game-over overlay so they know why a new tile appeared. Only fires
    // once — subsequent qualifying runs are silent.
    let justUnlockedMaster = false;
    if (
      !isMasterUnlocked() &&
      tierId === MASTER_UNLOCK_TIER &&
      score >= MASTER_UNLOCK_SCORE
    ) {
      setMasterUnlocked();
      justUnlockedMaster = true;
    }

    // === Bank the run's coins into the wallet ===
    // Coin value picked up this run becomes persistent currency for the
    // upgrade shop. Tier-scaled coin values already include the multiplier,
    // so higher tiers naturally bank faster.
    const coinsThisRun = runCoins;
    bankedCoins += coinsThisRun;
    saveBankedCoins();
    coinsEarnedText.textContent = `+${coinsThisRun.toLocaleString()} banked (${bankedCoins.toLocaleString()} total)`;
    refreshWalletUI();

    // Populate game-over UI
    refreshGameoverTier();
    finalScoreEl.textContent = score.toLocaleString();
    finalRoundEl.textContent = pairsPassed.toLocaleString();
    bestScoreEl.textContent = (bestScoreByTier[tierId] || 0).toLocaleString();
    bestRoundEl.textContent = (bestAsteroidsByTier[tierId] || 0).toLocaleString();
    // Reset badge states before showing the overlay, then flip them on after
    // a beat so the transition animation plays (otherwise they'd be static).
    newBestScoreEl.classList.remove('show');
    newBestRoundEl.classList.remove('show');

    // Contextual tip based on score + tier context. Kept short.
    const diff = getDifficulty();
    const bronzeV = diff.coinBronzeValue;
    const goldV = diff.coinGoldValue;
    if (score < bronzeV * 2) {
      unlockHintEl.textContent = `💡 Grab coins — gold = ${goldV}, bronze = ${bronzeV}`;
    } else if (score < bronzeV * 8) {
      unlockHintEl.textContent = '💡 Power-ups start appearing as you score higher';
    } else if (tierId === MASTER_UNLOCK_TIER && !isMasterUnlocked()) {
      // Nudge toward the unlock if they're close
      const progress = Math.floor((score / MASTER_UNLOCK_SCORE) * 100);
      if (progress >= 40) {
        unlockHintEl.textContent = `🔒 ${progress}% toward Master unlock`;
      } else {
        unlockHintEl.textContent = '';
      }
    } else {
      unlockHintEl.textContent = '';
    }

    setTimeout(() => {
      showOverlay(gameOverScreen);
      // Flash the NEW BEST! badges AFTER the overlay is visible so the
      // pop animation reads clearly. Extra delay per badge so the two
      // (if both are new bests) stagger nicely.
      if (scoreIsNewBest) {
        setTimeout(() => newBestScoreEl.classList.add('show'), 180);
      }
      if (roundIsNewBest) {
        setTimeout(() => newBestRoundEl.classList.add('show'), 320);
      }
      // Master unlock celebration: big toast that fades in, holds, fades out.
      // Timing: land well after game-over overlay is visible.
      if (justUnlockedMaster) {
        setTimeout(() => {
          unlockToast.classList.add('show');
          if (navigator.vibrate) navigator.vibrate([40, 60, 40, 60, 80]);
        }, 500);
        setTimeout(() => unlockToast.classList.remove('show'), 3200);
      }
    }, 700);
  }

  // --- Drawing ---
  function drawStars(dt) {
    const baseSpeed = SCROLL * 0.3;
    for (const s of stars) {
      s.x -= baseSpeed * s.z * dt;
      if (s.x < -2) {
        s.x = BASE_W + 2;
        s.y = Math.random() * BASE_H;
      }
      ctx.globalAlpha = 0.4 + s.z * 0.6;
      ctx.fillStyle = s.z > 0.7 ? '#fff' : (s.z > 0.45 ? '#c9d4ff' : '#6b75a8');
      ctx.fillRect(s.x, s.y, s.s, s.s);
    }
    ctx.globalAlpha = 1;
  }

  function drawRocket() {
    ctx.save();
    ctx.translate(rocket.x, rocket.y);
    ctx.rotate(rocket.rot);

    // === Shield aura ===
    // Always visible when charges > 0 (so player knows they have protection).
    // Pulses more intensely during post-hit i-frame.
    // Layered effect during the brief "shield just popped" moment.
    const hasCharges = shieldCharges > 0;
    const inIFrame = performance.now() < shieldIFrameUntil;
    if (hasCharges || inIFrame || shieldPopEffect > 0) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() / (inIFrame ? 60 : 180));
      const baseR = 22 + pulse * (inIFrame ? 6 : 2);
      const r = baseR + shieldPopEffect * 14;
      const alpha = 0.28 + (inIFrame ? 0.35 : 0) + shieldPopEffect * 0.5;
      const grad = ctx.createRadialGradient(0, 0, 12, 0, 0, r);
      grad.addColorStop(0, 'rgba(106,240,255,0.0)');
      grad.addColorStop(0.7, `rgba(106,240,255,${alpha})`);
      grad.addColorStop(1, 'rgba(106,240,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // === Magnet field ring ===
    // A rotating dashed ring at the current effective magnet radius so the
    // player can see the attraction zone. Scales with upgrades.
    if (magnetTime > 0) {
      const mr = getMagnetRadius();
      const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 220);
      ctx.save();
      ctx.rotate(-rocket.rot); // de-rotate so the ring stays world-aligned
      // Outer subtle glow
      const fieldGrad = ctx.createRadialGradient(0, 0, Math.max(0, mr - 30), 0, 0, mr);
      fieldGrad.addColorStop(0, 'rgba(255, 121, 198, 0)');
      fieldGrad.addColorStop(0.85, `rgba(255, 121, 198, ${0.1 * pulse})`);
      fieldGrad.addColorStop(1, 'rgba(255, 121, 198, 0)');
      ctx.fillStyle = fieldGrad;
      ctx.beginPath();
      ctx.arc(0, 0, mr, 0, Math.PI * 2);
      ctx.fill();
      // Dashed rotating ring for a clear edge
      ctx.strokeStyle = `rgba(255, 121, 198, ${0.5 * pulse})`;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 8]);
      ctx.lineDashOffset = -(performance.now() / 40);
      ctx.beginPath();
      ctx.arc(0, 0, mr, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    ctx.fillStyle = '#f0f2ff';
    ctx.beginPath();
    ctx.moveTo(16, 0);
    ctx.lineTo(6, -8);
    ctx.lineTo(-12, -8);
    ctx.quadraticCurveTo(-16, -8, -16, -4);
    ctx.lineTo(-16, 4);
    ctx.quadraticCurveTo(-16, 8, -12, 8);
    ctx.lineTo(6, 8);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#ff4f6d';
    ctx.fillRect(-6, -8, 6, 16);

    ctx.fillStyle = '#6af0ff';
    ctx.beginPath();
    ctx.arc(3, 0, 3.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(4, -1, 1.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ff4f6d';
    ctx.beginPath();
    ctx.moveTo(-12, -8);
    ctx.lineTo(-18, -13);
    ctx.lineTo(-12, -4);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-12, 8);
    ctx.lineTo(-18, 13);
    ctx.lineTo(-12, 4);
    ctx.closePath();
    ctx.fill();

    // Flame — bigger while thrusting
    const fl = (thrusting && state === STATE.PLAY ? 14 : 8) + Math.random() * 5;
    const grad = ctx.createLinearGradient(-16, 0, -16 - fl, 0);
    grad.addColorStop(0, '#ffd86b');
    grad.addColorStop(0.5, '#ff7e3c');
    grad.addColorStop(1, 'rgba(255,80,60,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-16, -4);
    ctx.lineTo(-16 - fl, 0);
    ctx.lineTo(-16, 4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawAsteroid(a) {
    ctx.save();
    const grad = ctx.createLinearGradient(a.x, 0, a.x + a.w, 0);
    grad.addColorStop(0, '#4a3a5c');
    grad.addColorStop(0.5, '#7a6a8c');
    grad.addColorStop(1, '#3a2a4c');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#2a1e3a';
    ctx.lineWidth = 2;

    ctx.beginPath();
    const steps = Math.max(6, Math.floor(a.h / 18));
    const cx = a.x + a.w / 2;

    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const yy = a.y + t * a.h;
      const wobble = Math.sin(t * 9 + a.seed) * 3 + Math.cos(t * 4 + a.seed * 1.3) * 2;
      const xx = a.x - wobble;
      if (i === 0) ctx.moveTo(xx, yy);
      else ctx.lineTo(xx, yy);
    }
    for (let i = steps; i >= 0; i--) {
      const t = i / steps;
      const yy = a.y + t * a.h;
      const wobble = Math.sin(t * 7 + a.seed * 1.7) * 3 + Math.cos(t * 3 + a.seed) * 2;
      const xx = a.x + a.w + wobble;
      ctx.lineTo(xx, yy);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    const craters = 3;
    for (let i = 0; i < craters; i++) {
      const cy = a.y + (i + 0.5) / craters * a.h + Math.sin(a.seed + i) * 10;
      const cr = 4 + ((a.seed * (i + 1)) % 5);
      ctx.beginPath();
      ctx.arc(cx + Math.sin(a.seed + i * 1.3) * 8, cy, cr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Powerup visual definitions — single source of truth for each type's
  // color + icon glyph. Used both by drawPowerup and by the HUD badges.
  const POWERUP_DEFS = {
    shield: { color: '#6af0ff', icon: '🛡', label: 'SHIELD' },
    slowmo: { color: '#c879ff', icon: '⏱', label: 'SLOW-MO' },
    double: { color: '#ffb84d', icon: '2✕', label: '2× SCORE' },
    magnet: { color: '#ff79c6', icon: '🧲', label: 'MAGNET' },
  };

  function drawPowerup(p) {
    ctx.save();
    const bob = Math.sin(performance.now() / 300 + p.phase) * 3;
    ctx.translate(p.x, p.y + bob);

    const def = POWERUP_DEFS[p.type] || POWERUP_DEFS.shield;
    const color = def.color;
    const grad = ctx.createRadialGradient(0, 0, 4, 0, 0, 22);
    grad.addColorStop(0, color + 'cc');
    grad.addColorStop(0.5, color + '55');
    grad.addColorStop(1, color + '00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#0b0f26';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = color;
    // "2✕" needs a slightly smaller font to fit cleanly in the circle
    ctx.font = p.type === 'double' ? 'bold 13px sans-serif' : 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(def.icon, 0, 1);
    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawCoin(c) {
    ctx.save();
    const collected = c.collected;
    // Collected coins shrink and fade rapidly toward the score HUD feel
    const shrink = collected ? (1 - c.collectAnim) : 1;
    const alpha = collected ? (1 - c.collectAnim) : 1;
    ctx.globalAlpha = alpha;

    const bob = Math.sin(performance.now() / 250 + c.phase) * 2;
    const spin = Math.sin(performance.now() / 180 + c.phase); // -1..1, used for width
    ctx.translate(c.x, c.y + bob);
    const rr = c.r * shrink;

    if (c.kind === 'gold') {
      // Gold coin: big glow, warm color, swirling particles visually
      const glowR = rr * 2.8;
      const g = ctx.createRadialGradient(0, 0, 2, 0, 0, glowR);
      g.addColorStop(0, 'rgba(255, 216, 107, 0.8)');
      g.addColorStop(0.4, 'rgba(255, 170, 60, 0.3)');
      g.addColorStop(1, 'rgba(255, 120, 40, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, glowR, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Bronze: small warm glow
      const glowR = rr * 1.8;
      const g = ctx.createRadialGradient(0, 0, 1, 0, 0, glowR);
      g.addColorStop(0, 'rgba(215, 130, 60, 0.5)');
      g.addColorStop(1, 'rgba(215, 130, 60, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, glowR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Coin body — ellipse that spins on Y axis (width changes via spin)
    const widthScale = 0.3 + 0.7 * Math.abs(spin);
    const coinW = rr * widthScale;
    const coinH = rr;

    // Outer ring (darker) + inner face
    if (c.kind === 'gold') {
      ctx.fillStyle = '#b5862b';
      ctx.beginPath();
      ctx.ellipse(0, 0, coinW + 1.2, coinH + 1.2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffd86b';
    } else {
      ctx.fillStyle = '#7a4d23';
      ctx.beginPath();
      ctx.ellipse(0, 0, coinW + 1, coinH + 1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#d89a55';
    }
    ctx.beginPath();
    ctx.ellipse(0, 0, coinW, coinH, 0, 0, Math.PI * 2);
    ctx.fill();

    // Center "$" or sparkle — only visible when coin face is towards camera
    if (widthScale > 0.55) {
      ctx.fillStyle = c.kind === 'gold' ? '#8a5c10' : '#5c3510';
      ctx.font = `bold ${Math.round(rr * 1.1)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, 1);
    }

    ctx.restore();
  }

  function drawPopup(p) {
    ctx.save();
    const t = p.life / p.maxLife;
    ctx.globalAlpha = Math.min(1, t * 1.6);
    // Color by kind — prefer a lookup so new kinds are easy to add
    let color = '#d89a55'; // bronze default
    if (p.kind === 'gold') color = '#ffd86b';
    else if (p.kind === 'shield_gain') color = '#6af0ff';
    else if (p.kind === 'slowmo') color = '#c879ff';
    else if (p.kind === 'double') color = '#ffb84d';
    else if (p.kind === 'magnet') color = '#ff79c6';
    ctx.fillStyle = color;
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 3;
    // Bigger font for the "important" kinds so powerup popups read clearly
    const big = p.kind === 'gold' || p.kind === 'shield_gain' || p.kind === 'double' || p.kind === 'magnet' || p.kind === 'slowmo';
    ctx.font = `bold ${big ? 18 : 15}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  }

  // Central score-addition gate. Applies the active multiplier (2x when the
  // `double` powerup is active) to every incoming point. Also updates the HUD.
  // Returns the actual amount added (useful for floating popups — we want
  // the popup to show the doubled value, not the base value).
  function addScore(amount) {
    // Upgrade tiers raise the multiplier: 2× → 3× → 6× → 9×
    const mult = doubleTime > 0 ? getDoublePower() : 1;
    const actual = amount * mult;
    score += actual;
    updateHud();
    return actual;
  }

  function updateHud() {
    // Score (currency) — the bottom center big number, comma-formatted.
    scoreValue.textContent = score.toLocaleString();
    // Round count (achievement) — top center, no formatting needed; these
    // numbers stay smallish even on long runs.
    roundValue.textContent = pairsPassed;
  }

  // --- Update ---
  function update(dt) {
    const timeScale = slowmoTime > 0 ? 0.45 : 1.0;
    const sdt = dt * timeScale;

    // Sync the looped thrust audio to whatever `thrusting` is right now.
    // Cheap idempotent call — only actually starts/stops the sound on flips.
    syncThrustSound();

    // Hold-to-thrust
    if (state === STATE.PLAY && thrusting) {
      rocket.vy += THRUST * sdt;
      if (Math.random() < 0.65) {
        addParticles(rocket.x - 14, rocket.y + 4, {
          n: 2, color: '#ffb84d', speed: 1.8, life: 18, vx: -2.5,
        });
      }
    }

    // Physics
    rocket.vy += GRAVITY * sdt;
    // NEW: velocity clamps — prevents runaway up-speed and tames free-fall
    if (rocket.vy < MAX_UP_VY) rocket.vy = MAX_UP_VY;
    if (rocket.vy > MAX_DOWN_VY) rocket.vy = MAX_DOWN_VY;

    rocket.y += rocket.vy * sdt;
    rocket.rot = Math.max(-0.5, Math.min(1.0, rocket.vy * 0.08));

    // Scroll world
    const scroll = SCROLL * sdt;
    distance += scroll;

    nextAsteroidX -= scroll;
    if (nextAsteroidX < BASE_W) {
      spawnAsteroidPair(BASE_W + 30);
      nextAsteroidX = BASE_W + 170 + Math.random() * 30;
    }

    for (const a of asteroids) a.x -= scroll;
    for (const p of powerups) p.x -= scroll;
    for (const c of coins) {
      c.x -= scroll;
      // === Magnet pull ===
      // While active, uncollected coins within current effective radius are
      // attracted toward the rocket. Pull strength scales with proximity.
      if (magnetTime > 0 && !c.collected) {
        const mr = getMagnetRadius();
        const ms = getMagnetStrength();
        const dx = rocket.x - c.x;
        const dy = rocket.y - c.y;
        const d2 = dx * dx + dy * dy;
        const r2 = mr * mr;
        if (d2 < r2 && d2 > 1) {
          const d = Math.sqrt(d2);
          const falloff = 1 - d / mr;
          const pull = ms * falloff * sdt;
          c.x += (dx / d) * pull * 6;
          c.y += (dy / d) * pull * 6;
          // Tiny sparkle trail so the pull is visible
          if (Math.random() < 0.3) {
            addParticles(c.x, c.y, {
              n: 1, color: '#ff79c6', speed: 0.4, life: 12, size: 1.2,
            });
          }
        }
      }
    }

    asteroids = asteroids.filter(a => a.x + a.w > -10);
    powerups = powerups.filter(p => p.x > -20);
    coins = coins.filter(c => c.x > -20 && c.collectAnim < 1);

    // === Scoring from passed asteroid pairs ===
    // Pair-pass scoring is tier-controlled (pairsPerPoint / pointsPerPair),
    // so higher tiers reward survival more generously. Coins remain the
    // dominant earner but this gives a steady baseline.
    const diff = getDifficulty();
    for (const a of asteroids) {
      if (!a.passed && a.top && a.x + a.w < rocket.x) {
        a.passed = true;
        pairsPassed++;
        if (pairsPassed % diff.pairsPerPoint === 0) {
          addScore(diff.pointsPerPair);
        } else {
          updateHud(); // still update so asteroid count increments
        }
        Audio.play.asteroidPass();

        // Powerup spawn trigger — pair-based so cadence is tier-independent.
        // Each tier sets its own `powerupEveryPairs` (Beginner generous,
        // Master sparse). Random ±20% wobble so they don't feel metronomic.
        if (pairsPassed >= nextPowerupPair) {
          const upcoming = asteroids.filter(x => x.top && !x.passed && x.x > rocket.x + 40);
          if (upcoming.length > 0) {
            const top = upcoming[0];
            const bottom = asteroids.find(b => !b.top && Math.abs(b.x - top.x) < 5);
            if (bottom) {
              const midY = (top.h + bottom.y) / 2;
              spawnPowerup(top.x + top.w / 2, midY);
            }
          }
          const base = diff.powerupEveryPairs;
          // Jitter: 0.8× to 1.2× the base cadence, rounded to whole pairs.
          const jitter = 0.8 + Math.random() * 0.4;
          nextPowerupPair = pairsPassed + Math.max(1, Math.round(base * jitter));
        }
      }
    }

    // === Coin collection ===
    for (const c of coins) {
      if (c.collected) continue;
      const dx = c.x - rocket.x, dy = c.y - rocket.y;
      if (dx * dx + dy * dy < (c.r + rocket.r) * (c.r + rocket.r)) {
        c.collected = true;
        c.collectAnim = 0.01; // starts the shrink/fade
        const gained = addScore(c.value);
        // Track coins collected this run — these become banked currency.
        // We track each coin's VALUE (6 for bronze, 21 for gold), not a
        // count, so a gold coin rewards more banked currency too. This keeps
        // "gold feels valuable" consistent between score and wallet.
        runCoins += c.value;
        // Popup shows the actual gained amount, so 2x feels visible
        popups.push({
          x: c.x, y: c.y, text: '+' + gained,
          // If 2x was active, upgrade the popup kind so it looks flashier
          kind: doubleTime > 0 ? 'gold' : c.kind,
          life: 45, maxLife: 45,
        });
        // Particle burst — more intense for gold
        const burstColor = c.kind === 'gold' ? '#ffd86b' : '#d8a664';
        addParticles(c.x, c.y, {
          n: c.kind === 'gold' ? 18 : 10,
          color: burstColor, speed: 2.5, life: 28, size: 2,
        });
        if (navigator.vibrate) navigator.vibrate(c.kind === 'gold' ? 18 : 8);
        if (c.kind === 'gold') Audio.play.coinGold();
        else Audio.play.coinBronze();
      }
    }

    // === Collisions with asteroids ===
    // Shield charges auto-activate on hit. Post-hit iFrame is tunable via
    // the Overcharged Shields upgrade (base 900ms → T3 2500ms). Overcharge
    // T3 additionally grants a brief magnet aura during iFrame so taking a
    // hit can still feel rewarding.
    const inIFrame = performance.now() < shieldIFrameUntil;
    if (!inIFrame) {
      for (const a of asteroids) {
        if (circleRectOverlap(rocket.x, rocket.y, rocket.r, a.x + 4, a.y, a.w - 8, a.h)) {
          if (shieldCharges > 0) {
            // === SHIELD POP ===
            shieldCharges--;
            const iframeMs = getShieldIframeMs();
            shieldIFrameUntil = performance.now() + iframeMs;
            shieldPopEffect = 1;
            shake = Math.max(shake, 10);
            // Visual/haptic feedback — cyan burst
            addParticles(rocket.x, rocket.y, {
              n: 26, color: '#6af0ff', speed: 3.5, life: 32, size: 2.5,
            });
            flashEl.style.transition = 'none';
            flashEl.style.opacity = '0.25';
            requestAnimationFrame(() => {
              flashEl.style.transition = 'opacity 0.2s ease-out';
              flashEl.style.opacity = '0';
            });
            if (navigator.vibrate) navigator.vibrate([10, 30, 20]);
            Audio.play.shieldPop();
            // Overcharge T3: grant a brief magnet aura matching the iFrame
            // window. If magnet is already running, extend it up to the
            // iFrame end (Math.max avoids accidentally *shortening* a longer
            // active magnet).
            if (hasOverchargeT3()) {
              magnetTime = Math.max(magnetTime, iframeMs);
              // Subtle pink particle puff to signal the magnet kicked in
              addParticles(rocket.x, rocket.y, {
                n: 10, color: '#ff79c6', speed: 2.2, life: 28, size: 1.8,
              });
            }
            updateHud();
          } else {
            gameOver();
          }
          break;
        }
      }
    }

    // Bounds
    if (rocket.y - rocket.r < 0) {
      rocket.y = rocket.r;
      rocket.vy = 0;
    }
    if (rocket.y + rocket.r > BASE_H) {
      rocket.y = BASE_H - rocket.r;
      if (state === STATE.PLAY) gameOver();
    }

    // === Powerup pickups ===
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      const dx = p.x - rocket.x, dy = p.y - rocket.y;
      if (dx * dx + dy * dy < (p.r + rocket.r) * (p.r + rocket.r)) {
        const def = POWERUP_DEFS[p.type] || POWERUP_DEFS.shield;

        if (p.type === 'shield') {
          // Shield pickup: +1 charge up to the effective cap (tier max +
          // Reinforced Hull delta). If maxed, consolation points (through
          // addScore so 2x applies) so the pickup isn't wasted.
          const maxShields = getMaxShields();
          if (shieldCharges < maxShields) {
            shieldCharges++;
            popups.push({
              x: p.x, y: p.y, text: '+SHIELD',
              kind: 'shield_gain', life: 50, maxLife: 50,
            });
          } else {
            const gained = addScore(15);
            popups.push({
              x: p.x, y: p.y, text: '+' + gained,
              kind: 'gold', life: 45, maxLife: 45,
            });
          }
          Audio.play.shieldPickup();
        } else if (p.type === 'slowmo') {
          slowmoTime = SLOWMO_DUR;
          popups.push({
            x: p.x, y: p.y, text: 'SLOW-MO',
            kind: 'slowmo', life: 50, maxLife: 50,
          });
          Audio.play.slowmoPickup();
        } else if (p.type === 'double') {
          // 2× multiplier — stacks by refreshing duration, not doubling it.
          // (Stacking durations could be OP; refresh is standard rogue-like.)
          doubleTime = getDoubleDuration();
          popups.push({
            x: p.x, y: p.y, text: getDoublePower() + '✕ SCORE',
            kind: 'double', life: 55, maxLife: 55,
          });
          Audio.play.slowmoPickup(); // reusing for now — distinct sound later
        } else if (p.type === 'magnet') {
          magnetTime = getMagnetDuration();
          popups.push({
            x: p.x, y: p.y, text: 'MAGNET',
            kind: 'magnet', life: 55, maxLife: 55,
          });
          Audio.play.shieldPickup(); // reusing for now — distinct sound later
        }

        // Shared visual: particle burst in the powerup's color
        addParticles(p.x, p.y, {
          n: 20, color: def.color, speed: 3, life: 35, size: 2,
        });
        if (navigator.vibrate) navigator.vibrate(20);
        powerups.splice(i, 1);
      }
    }

    // === Coin collect animations ===
    for (const c of coins) {
      if (c.collected && c.collectAnim < 1) {
        c.collectAnim = Math.min(1, c.collectAnim + 0.08 * sdt);
      }
    }

    // === Popups (floating point-gain text) ===
    for (const p of popups) {
      p.y -= 0.7 * sdt;
      p.life -= sdt;
    }
    popups = popups.filter(p => p.life > 0);

    // Particles
    for (const p of particles) {
      p.x += p.vx * sdt;
      p.y += p.vy * sdt;
      p.vy += 0.04 * sdt;
      p.life -= sdt;
    }
    particles = particles.filter(p => p.life > 0);

    // All duration-based powerups decay on real time (not slowmo-scaled) so
    // slowmo can't extend itself or the others.
    if (slowmoTime > 0) slowmoTime = Math.max(0, slowmoTime - dt * (1000 / 60));
    if (doubleTime > 0) doubleTime = Math.max(0, doubleTime - dt * (1000 / 60));
    if (magnetTime > 0) magnetTime = Math.max(0, magnetTime - dt * (1000 / 60));
    // Shield-pop visual decays back to 0
    if (shieldPopEffect > 0) shieldPopEffect = Math.max(0, shieldPopEffect - 0.04 * dt);

    if (shake > 0) shake = Math.max(0, shake - 0.5 * dt);
  }

  function updateDead(dt) {
    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 0.08 * dt;
      p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);
    if (shake > 0) shake = Math.max(0, shake - 0.5 * dt);
  }

  function circleRectOverlap(cx, cy, cr, rx, ry, rw, rh) {
    const nx = Math.max(rx, Math.min(cx, rx + rw));
    const ny = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - nx, dy = cy - ny;
    return dx * dx + dy * dy < cr * cr;
  }

  function renderPowerupBadges() {
    // Shield slots: pip count matches effective max shields (tier + Hull
    // upgrade); filled ones = available charges. With max at 6 (Fortress
    // Frame on Beginner) the badge gets crowded but still readable.
    let html = '';
    if (state === STATE.PLAY || state === STATE.DEAD) {
      const maxShields = getMaxShields();
      let pips = '';
      for (let i = 0; i < maxShields; i++) {
        const filled = i < shieldCharges;
        pips += `<span class="shield-pip${filled ? ' filled' : ''}"></span>`;
      }
      if (maxShields > 0) {
        html += `<div class="pu-badge shield shield-slots">🛡 ${pips}</div>`;
      }
    }
    // Compact builder for any duration-based powerup badge.
    // When time remaining drops below WARN_MS, the badge gets an `.expiring`
    // class so CSS can apply the blink animation. Threshold is 1.5s so the
    // warning reads visually before the buff is actually gone.
    const WARN_MS = 1500;
    function durBadge(type, timeLeft, maxDur) {
      const def = POWERUP_DEFS[type];
      const pct = Math.max(0, timeLeft / maxDur);
      const expiring = timeLeft < WARN_MS ? ' expiring' : '';
      return `<div class="pu-badge ${type}${expiring}">${def.icon} ${def.label} <div class="pu-bar"><div style="transform:scaleX(${pct})"></div></div></div>`;
    }
    if (slowmoTime > 0) html += durBadge('slowmo', slowmoTime, SLOWMO_DUR);
    if (doubleTime > 0) html += durBadge('double', doubleTime, getDoubleDuration());
    if (magnetTime > 0) html += durBadge('magnet', magnetTime, getMagnetDuration());
    if (powerupsEl.innerHTML !== html) powerupsEl.innerHTML = html;
  }

  function render(dt) {
    ctx.save();

    let sx = 0, sy = 0;
    if (shake > 0) {
      sx = (Math.random() - 0.5) * shake;
      sy = (Math.random() - 0.5) * shake;
      ctx.translate(sx, sy);
    }

    ctx.fillStyle = '#05060f';
    ctx.fillRect(-20, -20, BASE_W + 40, BASE_H + 40);

    const g = ctx.createRadialGradient(BASE_W * 0.3, BASE_H * 0.3, 20, BASE_W * 0.3, BASE_H * 0.3, 400);
    g.addColorStop(0, 'rgba(90, 40, 140, 0.35)');
    g.addColorStop(1, 'rgba(90, 40, 140, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(-20, -20, BASE_W + 40, BASE_H + 40);

    drawStars(dt);
    for (const a of asteroids) drawAsteroid(a);
    for (const c of coins) drawCoin(c);
    for (const p of powerups) drawPowerup(p);
    drawParticles();
    if (state !== STATE.DEAD) drawRocket();
    // Popups render LAST so they float over everything else (score feedback
    // needs to be the most visible thing on screen when it happens).
    for (const p of popups) drawPopup(p);

    if (slowmoTime > 0) {
      ctx.fillStyle = 'rgba(200, 121, 255, 0.08)';
      ctx.fillRect(-20, -20, BASE_W + 40, BASE_H + 40);
    }
    if (doubleTime > 0) {
      // Subtle gold tint with a gentle pulse so player feels the bonus is active
      const pulse = 0.06 + 0.02 * Math.sin(performance.now() / 200);
      ctx.fillStyle = `rgba(255, 184, 77, ${pulse})`;
      ctx.fillRect(-20, -20, BASE_W + 40, BASE_H + 40);
    }

    ctx.restore();
  }

  let lastT = 0;
  function loop(t) {
    if (!lastT) lastT = t;
    let dt = (t - lastT) / (1000 / 60);
    lastT = t;
    dt = Math.min(dt, 2.5);

    ctx.clearRect(0, 0, BASE_W, H);

    if (state === STATE.PLAY) update(dt);
    else if (state === STATE.DEAD) updateDead(dt);
    else {
      rocket.y = BASE_H / 2 + Math.sin(t / 400) * 12;
      rocket.rot = Math.sin(t / 400) * 0.12;
      for (const s of stars) {
        s.x -= SCROLL * 0.3 * s.z * dt;
        if (s.x < -2) {
          s.x = BASE_W + 2;
          s.y = Math.random() * BASE_H;
        }
      }
    }

    render(dt);
    renderPowerupBadges();

    requestAnimationFrame(loop);
  }

  // Init
  resize();
  initStars();
  // Ensure initial button state matches which overlay is visible on page load:
  // start screen is active (enabled), game over/shop/settings are hidden (disabled).
  setButtonsEnabled(startScreen, true);
  setButtonsEnabled(gameOverScreen, false);
  setButtonsEnabled(shopScreen, false);
  setButtonsEnabled(settingsScreen, false);
  refreshWalletUI();  // show current banked coins on main menu
  renderDifficultySelector();  // build the 4 tiles (Master locked unless unlocked)
  requestAnimationFrame(loop);

  // Service worker registration — enabled for HTTPS deployment (Netlify, etc.)
  // On plain http:// (except localhost), browsers silently reject SW registration,
  // so this block is harmless when running locally via file:// or LAN HTTP.
  // Caches the game for offline play and enables "Add to Home Screen" as a full PWA.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
